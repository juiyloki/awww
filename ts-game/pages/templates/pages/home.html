{% extends "pages/base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
        <h1>Choose a level</h1>
        <div id="app-root">Loading…</div>
    {% else %}
        <h1>Minesweeper</h1>
        <p>Welcome! <a href="{% url 'login' %}">Log in</a> or <a href="{% url 'register' %}">register</a> to start playing.</p>
    {% endif %}
{% endblock %}
