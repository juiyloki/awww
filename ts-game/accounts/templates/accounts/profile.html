{% extends "pages/base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
    <h1>{{ user.username }}</h1>
    <dl>
        <dt>Email</dt>
        <dd>{{ user.email|default:"(none)" }}</dd>
        <dt>Joined</dt>
        <dd>{{ user.date_joined|date:"d M Y" }}</dd>
    </dl>
{% endblock %}
