<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TypeScript Lab</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; }
        #output { border: 1px solid #ccc; padding: 1rem; min-height: 100px; }
        .error { color: red; }
        table { border-collapse: collapse; margin-top: 0.5rem; }
        td, th { border: 1px solid #ddd; padding: 4px 8px; }
        .shape-gallery { display: flex; gap: 1rem; flex-wrap: wrap; }
        .shape-gallery figure { margin: 0; text-align: center; }
        .pipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        textarea { width: 100%; min-height: 8rem; font-family: monospace; }
    </style>
</head>
<body>
    <h1>TypeScript Lab 8</h1>
    <div id="output"></div>
    <script src="dist/main.js"></script>
</body>
</html>
