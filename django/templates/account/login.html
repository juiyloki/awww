{% extends "pages/base.html" %}
{% load socialaccount %}

{% block title %}Login{% endblock %}

{% block content %}
<article>
<h1>Login</h1>
<section>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
</form>
<p><a href="{% provider_login_url 'github' %}">Login with GitHub</a></p>
<p>No account? <a href="{% url 'register' %}">Register</a></p>
</section>
</article>
{% endblock %}
