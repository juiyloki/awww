{% extends "pages/base.html" %}

{% block title %}Logout{% endblock %}

{% block content %}
<article>
    <h1>Sign Out</h1>
    <section>
        <p>Are you sure you want to sign out?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Yes, sign out</button>
        </form>
        <p><a href="{% url 'home' %}">← Cancel</a></p>
    </section>
</article>
{% endblock %}
